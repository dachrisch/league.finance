services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:8
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: leagues_finance
    restart: unless-stopped

volumes:
  mongo_data:
