# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: 🏗️🧪🚀 Build, Test and Deploy everything

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  checks: write
  security-events: write

concurrency:
  group: build-test-deploy
  cancel-in-progress: true


jobs:
  node-project:
    uses: ./.github/workflows/part_node_build.yaml
    secrets: inherit
    with:
      project: .

  docker-image:
    uses: ./.github/workflows/part_docker_build.yaml
    with:
      dockerfile: Dockerfile
      image_name: league.finance
      version: "${{ github.ref_name }}"

  image-test:
    needs:
      - node-project
      - docker-image
    uses: ./.github/workflows/part_docker_test.yaml
    with:
      artifact_name: ${{ needs.docker-image.outputs.artifact_name }}
      image_name: league.finance

  image-push:
    needs:
      - docker-image
      - image-test
    secrets: inherit
    uses: ./.github/workflows/part_docker_push.yaml
    with:
      artifact_name: ${{ needs.docker-image.outputs.artifact_name }}
      image_name: dachrisch/league.finance
      local_image_name: league.finance
      version: "${{ github.ref_name }}"

  create-release:
    needs:
      - node-project
      - image-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 📝 Extract release notes from CHANGELOG
        id: release_notes
        run: |
          VERSION="${{ github.ref_name }}"
          # Extract release notes for the current version from CHANGELOG.md
          # Looks for the version section and captures everything until the next version
          RELEASE_NOTES=$(awk "
            /^### \[$VERSION\]/ {found=1; next}
            found && /^### \[/ {exit}
            found {print}
          " CHANGELOG.md | sed '/^[[:space:]]*$/d')

          # If no notes found, use a default message
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="Release $VERSION"
          fi

          # Store in multiline variable for GitHub Actions
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🎉 Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false
