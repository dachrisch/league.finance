# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: 🐳🧪 Test Docker Image

on:
  workflow_call:
    inputs:
      artifact_name:
        required: true
        description: The name of the artifact containing the Docker image
        type: string
      image_name:
        required: true
        description: The local name of the Docker image
        type: string

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download Docker image artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_name }}
          path: /tmp

      - name: 🐳 Load Docker image
        run: |
          docker load --input /tmp/${{ inputs.image_name }}.tar
          docker image ls -a

      - name: 🐳🧪 Test Docker image
        run: |
          docker run --detach --name test_container \
            -e GOOGLE_CLIENT_ID=ci-test \
            -e GOOGLE_CLIENT_SECRET=ci-test \
            -e GOOGLE_CALLBACK_URL=http://localhost:3000/auth/google/callback \
            -e JWT_SECRET=ci-test-secret \
            ${{ inputs.image_name }}:latest
          for i in {1..10}; do
            status=$(docker inspect --format='{{.State.Health.Status}}' test_container 2>/dev/null || echo "gone")
            echo "Health status: $status"
            if [ "$status" = "healthy" ]; then break; fi
            if [ "$status" = "gone" ]; then
              echo "Container exited unexpectedly. Logs:"
              docker logs test_container 2>/dev/null || true
              docker rm test_container 2>/dev/null || true
              exit 1
            fi
            sleep 6
          done
          if [ "$status" != "healthy" ]; then
            echo "Container did not become healthy after 10 attempts."
            docker logs test_container
            docker rm test_container
            exit 1
          fi
          docker stop test_container
          docker rm test_container
